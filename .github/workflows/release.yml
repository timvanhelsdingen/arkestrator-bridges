name: Release Bridges

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package bridge plugins
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist/bridges

          # Godot
          cd godot/addons
          zip -r "../../dist/bridges/godot.zip" arkestrator_bridge/
          cd ../..

          # Blender
          cd blender
          zip -r "../dist/bridges/blender.zip" arkestrator_bridge/
          cd ..

          # Houdini
          cd houdini
          zip -r "../dist/bridges/houdini.zip" arkestrator_bridge/ arkestrator_bridge.json
          cd ..

          # ComfyUI
          cd comfyui
          zip -r "../dist/bridges/comfyui.zip" arkestrator_bridge/
          cd ..

          # Unity
          cd unity
          zip -r "../dist/bridges/unity.zip" ArkestratorBridge/
          cd ..

          # Unreal
          cd unreal
          zip -r "../dist/bridges/unreal.zip" ArkestratorBridge/
          cd ..

          # Bundle all into single archive
          cd dist
          zip -r "arkestrator-bridges-v${VERSION}.zip" bridges/
          cd ..

          echo "Packaged bridge plugins:"
          ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/arkestrator-bridges-v*.zip
            registry.json
