name: Release Bridges

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package bridge plugins
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          # Godot
          cd godot/addons
          zip -r "../../dist/arkestrator-bridge-godot-v${VERSION}.zip" arkestrator_bridge/
          cd ../..

          # Blender
          cd blender
          zip -r "../dist/arkestrator-bridge-blender-v${VERSION}.zip" arkestrator_bridge/
          cd ..

          # Houdini
          cd houdini
          zip -r "../dist/arkestrator-bridge-houdini-v${VERSION}.zip" arkestrator_bridge/ arkestrator_bridge.json
          cd ..

          # ComfyUI
          cd comfyui
          zip -r "../dist/arkestrator-bridge-comfyui-v${VERSION}.zip" arkestrator_bridge/
          cd ..

          # Unity
          cd unity
          zip -r "../dist/arkestrator-bridge-unity-v${VERSION}.zip" ArkestratorBridge/
          cd ..

          # Unreal
          cd unreal
          zip -r "../dist/arkestrator-bridge-unreal-v${VERSION}.zip" ArkestratorBridge/
          cd ..

          # Fusion
          cd blackmagic-fusion
          zip -r "../dist/arkestrator-bridge-fusion-v${VERSION}.zip" . -x "coordinator.md" -x "install.py" -x "__pycache__/*" -x "*.pyc"
          cd ..

          echo "Packaged bridge plugins:"
          ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/arkestrator-bridge-*.zip
            registry.json
