name: Release Bridges

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package bridge plugins from registry
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIST="$GITHUB_WORKSPACE/dist"
          mkdir -p "$DIST"

          # Data-driven packaging: reads each bridge's "ci" spec from registry.json.
          # To add a new bridge to releases, just add it to registry.json with:
          #   "ci": { "dir": "<local-dir>", "include": ["<path>/"], "exclude": ["*.pyc"] }

          jq -c '.bridges[]' registry.json | while IFS= read -r bridge; do
            ID=$(echo "$bridge" | jq -r '.id')
            DIR=$(echo "$bridge" | jq -r '.ci.dir // empty')
            ASSET=$(echo "$bridge" | jq -r '.asset // empty')

            if [ -z "$DIR" ] || [ -z "$ASSET" ]; then
              echo "⚠  Skipping $ID — no ci.dir or asset in registry.json"
              continue
            fi

            BRIDGE_DIR="$GITHUB_WORKSPACE/$DIR"
            if [ ! -d "$BRIDGE_DIR" ]; then
              echo "⚠  Skipping $ID — directory $DIR not found"
              continue
            fi

            ZIPNAME=$(echo "$ASSET" | sed "s/{version}/$VERSION/g")

            # Build include list
            INCLUDES=$(echo "$bridge" | jq -r '.ci.include[]? // empty')

            # Build exclude args
            EXCLUDE_ARGS=""
            for exc in $(echo "$bridge" | jq -r '.ci.exclude[]? // empty'); do
              EXCLUDE_ARGS="$EXCLUDE_ARGS -x \"$exc\""
            done

            cd "$BRIDGE_DIR"
            eval zip -r "$DIST/$ZIPNAME" $INCLUDES $EXCLUDE_ARGS
            echo "✓  $ID → $ZIPNAME"
            cd "$GITHUB_WORKSPACE"
          done

          echo ""
          echo "Packaged bridge plugins:"
          ls -lh "$DIST/"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/arkestrator-bridge-*.zip
            registry.json
